# Si tienes alguna pregunta o problema, puedes preguntar en el servidor de soporte: https://discord.gg/Vr46JHm2kd
# Recuerda no eliminar ninguna línea de código.
# Para problemas, errores, ideas o sugerencias puedes hacerlo en el servidor de Discord.
# Esta plantilla interna se copia a /plugins/MaxTools/language_profiles/menus_es.yml si el perfil no existe.
# Edita language_profiles/menus_es.yml para personalizar los menús en español.
# --------------------------------------------------
#  Textos del Menú
# --------------------------------------------------
menu-texts:
  evolution-hub:
    title: '&8Menú de Evolución'
    tool-item:
      title: '&b{tool_name}'
      lore:
      - '&7Nivel actual: &f{current_level}'
      - '&7Siguiente nivel: &f{next_level}'
      - '&7Uso: &f{usage}'
      - '&7Objetivo: &f{target}'
      - '&7Hitos: &f{unlocked_milestones}&7/&f{total_milestones}'
      - '&7Habilidades: &f{unlocked_abilities}&7/&f{total_abilities}'

# --------------------------------------------------
#  Sonidos del Menú
# --------------------------------------------------
menu-sounds:
  enabled: true
  open:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0
  page-next:
    sound: ITEM_BOOK_PAGE_TURN
    volume: 1.0
    pitch: 1.1
  page-prev:
    sound: ITEM_BOOK_PAGE_TURN
    volume: 1.0
    pitch: 0.9
  open-abilities:
    sound: BLOCK_ENCHANTMENT_TABLE_USE
    volume: 1.0
    pitch: 1.0
  open-stats:
    sound: BLOCK_COMPARATOR_CLICK
    volume: 1.0
    pitch: 1.0
  back:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 0.8
  error:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0

