# --------------------------------------------------
#  Menu Texts
# --------------------------------------------------
menu-texts:
  evolution-hub:
    title: '&8Evolution Menu'
    tool-item:
      title: '&b{tool_name}'
      lore:
      - '&7Current level: &f{current_level}'
      - '&7Next level: &f{next_level}'
      - '&7Usage: &f{usage}'
      - '&7Goal: &f{target}'
      - '&7Milestones: &f{unlocked_milestones}&7/&f{total_milestones}'
      - '&7Abilities: &f{unlocked_abilities}&7/&f{total_abilities}'

# --------------------------------------------------
#  Menu Sounds
# --------------------------------------------------
menu-sounds:
  enabled: true
  open:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0
  page-next:
    sound: ITEM_BOOK_PAGE_TURN
    volume: 1.0
    pitch: 1.1
  page-prev:
    sound: ITEM_BOOK_PAGE_TURN
    volume: 1.0
    pitch: 0.9
  open-abilities:
    sound: BLOCK_ENCHANTMENT_TABLE_USE
    volume: 1.0
    pitch: 1.0
  open-stats:
    sound: BLOCK_COMPARATOR_CLICK
    volume: 1.0
    pitch: 1.0
  back:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 0.8
  error:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0

