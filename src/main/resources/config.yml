# If you have any questions or problems, you can ask on the support server: https://discord.gg/Vr46JHm2kd
# Remember not to delete any line of code.
# For problems, bugs, ideas or suggestions you can do it on the discord server.
general:
  language: en
  # When true, changing language from /met lang swaps config.yml + menus.yml by language profile.
  # Admin-editable profiles live in /plugins/MaxTools/language_profiles/.
  # If a profile does not exist yet, the plugin seeds it from the bundled internal template.
  # Edit language_profiles/config_es.yml and language_profiles/menus_es.yml for Spanish customizations.
  language-profile-sync: true
  prefix: '&#222DF5&lMaxTools &8» '
  # Default output mode for /met toolinfo:
  # false = legacy text chat, true = GUI (same as /met toolinfo gui).
  # Players can still force mode per-use with /met toolinfo <gui|text>.
  toolinfo-gui-default: false
  update-check: true
  bstats: true

discord:
  enabled: false
  webhook-url: ''
  # Display name used by the {server} placeholder in webhook messages.
  # Change this to avoid showing the server software name (for example: Paper).
  server-name: 'MaxTools'
  # Optional webhook identity override.
  # Leave empty to use the Discord webhook default name/avatar.
  username: 'MaxTools'
  avatar-url: ''
  allowed-mentions:
    # Empty = do not ping @everyone, roles or users from configured templates.
    # Valid values: everyone, roles, users
    parse: []
    replied-user: false
  queue:
    # Max pending Discord tasks in memory; oldest are discarded when full.
    max-pending: 256
  events:
    milestone-unlocked: true
    ability-unlocked: true
  # Legacy text messages. Used when discord.embeds.enabled is false.
  # Available placeholders: {player}, {player_uuid}, {tool}, {tool_type}, {blocks}, {ability}, {reward}, {timestamp}, {server}, {server_software}, {plugin}
  templates:
    milestone-unlocked: '**{player}** unlocked a milestone with **{tool}** at **{blocks}** blocks (`{timestamp}`) — reward: **{ability}**'
    ability-unlocked: '**{player}** unlocked ability **{ability}** on **{tool}** at **{blocks}** blocks (`{timestamp}`)'
    test-message: 'Test message from **{player}** with **{tool}** at **{blocks}** blocks (`{timestamp}`)'
  embeds:
    enabled: true
    # All event embed values support the placeholders listed above.
    milestone-unlocked:
      enabled: true
      content: ''
      title: 'Milestone Unlocked'
      description: '**{player}** reached **{blocks}** blocks with **{tool}**.'
      color: '#F59E0B'
      url: ''
      timestamp: true
      author:
        name: '{server}'
        url: ''
        icon-url: ''
      thumbnail-url: 'https://mc-heads.net/avatar/{player}/128'
      image-url: ''
      footer:
        text: 'Reward: {reward}'
        icon-url: ''
      fields:
        - name: 'Player'
          value: '{player}'
          inline: true
        - name: 'Tool'
          value: '{tool}'
          inline: true
        - name: 'Blocks'
          value: '{blocks}'
          inline: true
    ability-unlocked:
      enabled: true
      content: ''
      title: 'Ability Unlocked'
      description: '**{player}** unlocked **{ability}** on **{tool}**.'
      color: '#8B5CF6'
      url: ''
      timestamp: true
      author:
        name: '{server}'
        url: ''
        icon-url: ''
      thumbnail-url: 'https://mc-heads.net/avatar/{player}/128'
      image-url: ''
      footer:
        text: 'MaxTools Evolution'
        icon-url: ''
      fields:
        - name: 'Ability'
          value: '{ability}'
          inline: true
        - name: 'Tool'
          value: '{tool}'
          inline: true
        - name: 'Blocks'
          value: '{blocks}'
          inline: true
    test-message:
      enabled: true
      content: ''
      title: 'Discord Webhook Test'
      description: 'If you can see this, Discord notifications are configured correctly.'
      color: '#22C55E'
      url: ''
      timestamp: true
      author:
        name: '{server}'
        url: ''
        icon-url: ''
      thumbnail-url: ''
      image-url: ''
      footer:
        text: 'Sent by {player}'
        icon-url: ''
      fields:
        - name: 'Sender'
          value: '{player}'
          inline: true
        - name: 'Tool'
          value: '{tool}'
          inline: true

# Adds custom lore lines for each enchantment currently present on evolved tools.
# Placeholders: {enchant}, {key}, {level}
evolution-lore:
  enabled: true
  line-format: ' &#00FFFF{enchant} &8» &#FFD700Lvl. {level}'
  tiers:
  - Common
  - Rare
  - Epic
  - Mythic
  - Legendary
  states:
    active: '&#00FF00ACTIVE'
    cooldown: '&#FFA500ON COOLDOWN'
    blocked: '&#FF0000BLOCKED'
  sections:
    header:
      enabled: true
      top: '&#555555&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
      bottom: '&#555555&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
    tier:
      enabled: true
      mode: milestones # milestones | percent
      format: '&7Rarity: &f{tier}'
    progress:
      enabled: true
      bar-length: 10
      filled-char: ▰
      empty-char: ▱
      # Lore update optimization:
      # 1 = each block (more precise, more load).
      # 5 = every 5 blocks + %/meta changes (recommended).
      update-interval-blocks: 5
      format: '&7Progress: &8[{bar}&8] &8(&#00FFD1{percent}%&8) &7[{current}/{target}]'
    abilities:
      enabled: true
      show-locked: true
      title: '&7Abilities'
      line-format: ' &#D8B4FE{ability} &8» {ability_state} {cooldown}'
      cooldown-time-format: seconds # seconds | mm:ss
      cooldown-format: '&8(&#FFA500{cooldown}s&8)'
    enchantments:
      enabled: true
      title: '&#3B82F6Enchantments'
      line-format: ' &#60A5FA{enchant} &8» &#FCD34DLvl. {level}'
